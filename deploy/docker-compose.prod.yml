services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: backend-runtime
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3001
      REDIS_URL: redis://redis:6379
      FACEBOOK_SYNC_ENABLED: ${FACEBOOK_SYNC_ENABLED:-false}
      FACEBOOK_SYNC_ACCOUNT_BATCH_LIMIT: ${FACEBOOK_SYNC_ACCOUNT_BATCH_LIMIT:-25}
      FACEBOOK_QUEUE_RATE_LIMIT_PER_MINUTE: ${FACEBOOK_QUEUE_RATE_LIMIT_PER_MINUTE:-30}
      FACEBOOK_ACCOUNT_SYNC_CONCURRENCY: ${FACEBOOK_ACCOUNT_SYNC_CONCURRENCY:-2}
      FACEBOOK_CAMPAIGN_SYNC_CONCURRENCY: ${FACEBOOK_CAMPAIGN_SYNC_CONCURRENCY:-4}
      FACEBOOK_AD_SYNC_CONCURRENCY: ${FACEBOOK_AD_SYNC_CONCURRENCY:-4}
      FACEBOOK_MATERIAL_SYNC_CONCURRENCY: ${FACEBOOK_MATERIAL_SYNC_CONCURRENCY:-1}
      AUTOARK_DEPLOY_REF: ${AUTOARK_DEPLOY_REF:-unknown}
      AUTOARK_DEPLOY_COMMIT: ${AUTOARK_DEPLOY_COMMIT:-unknown}
      AUTOARK_DEPLOYED_AT: ${AUTOARK_DEPLOYED_AT:-unknown}
    depends_on:
      - redis

  agent:
    build:
      context: ..
      dockerfile: Dockerfile
      target: agent-runtime
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3002
      REDIS_URL: redis://redis:6379
      AUTOARK_DEPLOY_REF: ${AUTOARK_DEPLOY_REF:-unknown}
      AUTOARK_DEPLOY_COMMIT: ${AUTOARK_DEPLOY_COMMIT:-unknown}
      AUTOARK_DEPLOYED_AT: ${AUTOARK_DEPLOYED_AT:-unknown}
    depends_on:
      - redis

  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
      target: gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/www:/var/www/certbot:ro
      - ./tls/live:/etc/nginx/certs:ro
    depends_on:
      - backend
      - agent

  certbot:
    image: certbot/certbot:v2.11.0
    profiles:
      - tools
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

volumes:
  redis-data:
