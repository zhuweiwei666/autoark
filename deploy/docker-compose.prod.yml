services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: backend-runtime
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3001
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  agent:
    build:
      context: ..
      dockerfile: Dockerfile
      target: agent-runtime
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3002
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
      target: gateway
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - agent

volumes:
  redis-data:
