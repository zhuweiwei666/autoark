services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: backend-runtime
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3001
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  agent:
    build:
      context: ..
      dockerfile: Dockerfile
      target: agent-runtime
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3002
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
      target: gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/www:/var/www/certbot:ro
      - ./tls/live:/etc/nginx/certs:ro
    depends_on:
      - backend
      - agent

  certbot:
    image: certbot/certbot:v2.11.0
    profiles:
      - tools
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

volumes:
  redis-data:
