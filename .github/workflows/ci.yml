name: AutoArk CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Install Frontend Dependencies
      working-directory: ./autoark-frontend
      run: npm ci

    - name: Build Frontend
      working-directory: ./autoark-frontend
      run: npm run build

    - name: Install Backend Dependencies
      working-directory: ./autoark-backend
      run: npm ci

    - name: Build Backend
      working-directory: ./autoark-backend
      run: npm run build

    - name: Install Agent Dependencies
      working-directory: ./autoark-agent
      run: npm ci

    - name: Build Agent
      working-directory: ./autoark-agent
      run: npm run build

    - name: Install Agent Web Dependencies
      working-directory: ./autoark-agent/web
      run: npm ci

    - name: Build Agent Web
      working-directory: ./autoark-agent/web
      run: npm run build
